<!DOCTYPE html>

<title>Reprodução e Cria Comercial — MultBovinos</title>
<style>
  :root{
    --mb-green:#236209;
    --mb-olive:#94a853;
    --ms-teal:#038595;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:#000;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;
  }

  /* ---- Stage: letterboxes the 16:9 deck on black ---- */
  .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .deck{
    position:relative;
    width:100vw;height:56.25vw;      /* 16:9 */
    max-width:177.7778vh;max-height:100vh;
    overflow:hidden;
    background:#fff;
    container-type:size;            /* habilita cqw/cqh (usado pelo botão Voltar dos slides de Rotina) */
  }

  /* ---- Slides ---- */
  .slide{
    position:absolute;inset:0;
    opacity:0;visibility:hidden;
    transition:opacity .45s ease;
  }
  .slide.is-active{opacity:1;visibility:visible;}
  .slide__bg{width:100%;height:100%;object-fit:cover;display:block;}

  /* ---- Generic hotspot ---- */
  .hotspot{
    position:absolute;
    padding:0;border:0;background:transparent;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .hotspot:focus-visible{outline:3px solid #fff;outline-offset:3px;}

  /* ---- Slide 1: clickable arrow (vetorial, nítido em qualquer resolução) ---- */
  .arrow-1{
    left:60.5%;top:59.5%;width:7.2%;height:12.8%;
    border-radius:50%;
    background:linear-gradient(135deg,#3fd3e6 0%,#0aa0b8 100%);
    box-shadow:0 .4vw 1.1vw rgba(3,90,110,.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease, filter .2s ease;
  }
  .arrow-1 svg{width:52%;height:52%;display:block;}
  .arrow-1:hover{transform:scale(1.06);filter:brightness(1.05);}
  .arrow-1:active{transform:scale(.97);}

  /* ---- Slide 2: card / button hotspots ---- */
  .s2-hot{
    border-radius:clamp(6px,1.1vw,22px);
    transition:background .16s ease, box-shadow .16s ease;
  }
  .s2-hot:hover{
    background:rgba(255,255,255,.14);
    box-shadow:inset 0 0 0 max(2px,.18vw) rgba(255,255,255,.85),
               0 0 0 max(2px,.18vw) rgba(3,133,149,.35);
  }
  .s2-hot:active{background:rgba(255,255,255,.06);}

  /* ---- Footer / top-right nav hotspots ---- */
  .foot-hot{
    border-radius:999px;
    transition:background .16s ease, box-shadow .16s ease;
  }
  .foot-hot:hover{
    background:rgba(255,255,255,.22);
    box-shadow:0 0 0 max(2px,.18vw) rgba(255,255,255,.6);
  }
  .foot-hot:active{background:rgba(255,255,255,.1);}

  @media (prefers-reduced-motion:reduce){
    .slide{transition:none;}
  }

  /* ---- Placeholder slides ("em construção") ---- */
  .stub{
    background:radial-gradient(125% 125% at 82% 8%, #2c7a0e 0%, var(--mb-green) 46%, #143a05 100%);
    display:flex;align-items:center;justify-content:center;
  }
  .stub::before{
    content:"";position:absolute;inset:0;opacity:.07;pointer-events:none;
    background-image:radial-gradient(#fff 1.3px,transparent 1.3px);background-size:2.2vw 2.2vw;
  }
  .stub__card{position:relative;text-align:center;color:#fff;padding:0 6%;}
  .stub__eyebrow{font-size:1.7vh;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:#9ff0e6;}
  .stub__n{font-size:11vh;font-weight:800;letter-spacing:-.03em;line-height:1;margin-top:1vh;}
  .stub__n span{color:#7df0e6;}
  .stub__t{margin-top:1.6vh;font-size:2.6vh;font-weight:600;color:rgba(255,255,255,.92);}
  .stub__s{margin-top:1vh;font-size:1.7vh;color:rgba(255,255,255,.62);}
  .stub__btns{margin-top:4vh;display:flex;gap:1.4vh;justify-content:center;flex-wrap:wrap;}
  .stub__btn{
    display:inline-flex;align-items:center;gap:.6em;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);
    color:#fff;font-size:1.8vh;font-weight:600;padding:1.2vh 2.6vh;border-radius:999px;cursor:pointer;
    transition:background .15s ease;
  }
  .stub__btn:hover{background:rgba(255,255,255,.24);}
  .stub__btn--solid{background:#7df0e6;color:#0a3b34;border-color:#7df0e6;}
  .stub__btn--solid:hover{background:#9ff5ed;}

  /* ---- Auto-hiding nav controls (outside the art) ---- */
  .controls{
    position:fixed;left:18px;bottom:18px;right:auto;transform:none;
    display:flex;align-items:center;gap:14px;
    background:rgba(15,25,12,.62);backdrop-filter:blur(6px);
    padding:8px 14px;border-radius:999px;
    opacity:0;transition:opacity .3s ease;pointer-events:none;
    z-index:50;
  }
  .controls.show{opacity:1;pointer-events:auto;}
  .controls button, .controls a{
    width:30px;height:30px;border:0;border-radius:50%;
    background:rgba(255,255,255,.14);color:#fff;cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;justify-content:center;font-size:15px;
    transition:background .15s ease;
  }
  .controls button:hover:not(:disabled), .controls a:hover{background:rgba(255,255,255,.3);}
  .controls button:disabled{opacity:.3;cursor:default;}
  .controls .count{color:#fff;font-size:13px;font-weight:600;min-width:52px;text-align:center;letter-spacing:.04em;}
  .controls .home{font-size:13px;width:auto;padding:0 10px;border-radius:999px;}

  /* ---- Botão "Voltar às opções de eventos" (reutilizável nos slides de Rotinas de Manejo) ---- */
  .repro-back{
    position:absolute;left:6%;bottom:5.6%;z-index:4;
    display:flex;align-items:center;gap:1.3cqh;
    background:transparent;border:0;padding:0;cursor:pointer;
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  .repro-back__ic{
    width:5cqh;height:5cqh;border-radius:50%;flex:0 0 auto;
    background:linear-gradient(150deg,#45d2e6 0%,#1c9ad2 100%);
    box-shadow:0 .4cqh 1cqh rgba(6,60,90,.3);
    display:inline-flex;align-items:center;justify-content:center;
    transition:transform .16s ease, filter .16s ease;
  }
  .repro-back__ic svg{width:52%;height:52%;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
  .repro-back__t{font-size:2cqh;font-weight:600;color:#1e8ea0;white-space:nowrap;}
  .repro-back:hover .repro-back__ic{transform:scale(1.08);filter:brightness(1.05);}
  .repro-back:active .repro-back__ic{transform:scale(.95);}

  /* ---- Dica visual: pisca os botões interativos ao clicar fora deles ---- */
  @keyframes ccHintPulse{
    0%,50%,100%{ box-shadow:0 0 0 0 rgba(38,132,255,0); background-color:rgba(38,132,255,0); }
    25%,75%{ box-shadow:0 0 0 .55vw rgba(38,132,255,.4); background-color:rgba(38,132,255,.24); }
  }
  .cc-hint{ animation:ccHintPulse 1s ease both; border-radius:inherit; }
</style>

      </svg>
    </button>
    <button id="fs" type="button" aria-label="Tela cheia" title="Tela cheia">
      <svg id="fs-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <script>
    const TOTAL = 118;                      // total de páginas do PDF de Reprodução e Cria Comercial
    const BUILT = [1, 2, 3, 4, 5, 6, 7, 8, 9, 14, 22, 25, 27]; // slides já construídos (os demais são placeholders)

    const STORE = 'multsoft_repro_slide';
    const deck = document.getElementById('deck');

    /* ---- Gera placeholders "em construção" para os slides ainda não construídos ---- */
    function buildPlaceholders(){
      for(let n=1;n<=TOTAL;n++){
        if(BUILT.includes(n)) continue;
        const sec = document.createElement('section');
        sec.className = 'slide stub';
        sec.dataset.slide = n;
        sec.dataset.screenLabel = String(n).padStart(2,'0');
        sec.setAttribute('aria-label', 'Slide ' + n + ' — em construção');
        sec.innerHTML =
          '<div class="stub__card">' +
            '<div class="stub__eyebrow">Reprodução e Cria Comercial</div>' +
            '<div class="stub__n">Slide <span>' + String(n).padStart(2,'0') + '</span></div>' +
            '<div class="stub__t">Em construção</div>' +
            '<div class="stub__s">Este slide será criado na sequência. A navegação e os links já estão ativos.</div>' +
            '<div class="stub__btns">' +
              '<button class="stub__btn stub__btn--solid" type="button" onclick="goToSlide(2)">Voltar ao menu</button>' +
              '<button class="stub__btn" type="button" onclick="goToSlide(1)">Ir à capa</button>' +
            '</div>' +
          '</div>';
        deck.appendChild(sec);
      }
    }
    buildPlaceholders();

    /* ---- Rodapé padrão (slides de conteúdo lineares): voltar / menu / avançar.
       Coordenadas extraídas das imagens (botões embutidos no rodapé). ---- */
    function addFooter(slideNo){
      const el = document.querySelector('.slide[data-slide="'+slideNo+'"]');
      if(!el) return;
      const F = [
        { left:40.6, to:slideNo-1, title:'Voltar para o slide anterior' },
        { left:47.2, to:2,          title:'Ir para o menu' },
        { left:53.8, to:slideNo+1, title:'Avançar para o próximo slide' },
      ];
      F.forEach(f=>{
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'hotspot foot-hot';
        b.title = f.title; b.setAttribute('aria-label', f.title);
        b.style.cssText = 'left:'+f.left+'%;top:91.9%;width:5.4%;height:6.8%;';
        b.addEventListener('click', ()=> goToSlide(f.to));
        el.appendChild(b);
      });
    }
    [3, 4, 5].forEach(addFooter);

    /* ---- Botão "Voltar às opções de eventos" (slides de Rotinas de Manejo do Completo).
       Reutilizável: chame addReproBack(nºSlide) em cada novo slide de rotina. ---- */
    function addReproBack(slideNo, target){
      const el = document.querySelector('.slide[data-slide="'+slideNo+'"]');
      if(!el) return;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'repro-back';
      b.title = 'Voltar às opções de eventos';
      b.setAttribute('aria-label', 'Voltar às opções de eventos');
      b.innerHTML =
        '<span class="repro-back__ic"><svg viewBox="0 0 24 24"><path d="M9 14 4 9l5-5"/><path d="M4 9h9a7 7 0 0 1 7 7v1"/></svg></span>' +
        '<span class="repro-back__t">Voltar às opções de eventos</span>';
      b.addEventListener('click', ()=> goToSlide(target || 9));
      el.appendChild(b);
    }
    [14, 22, 25, 27].forEach(n => addReproBack(n));

    /* ---- Navegação por data-slide (índices estáveis para construção incremental) ---- */
    const slideEls = {};
    document.querySelectorAll('.slide').forEach(s => { slideEls[+s.dataset.slide] = s; });
    let current = 1;

    function clamp(n){ return Math.max(1, Math.min(TOTAL, n)); }

    function goToSlide(n){
      n = clamp(n);
      for(let i=1;i<=TOTAL;i++){
        const el = slideEls[i];
        if(!el) continue;
        const active = (i === n);
        el.classList.toggle('is-active', active);
        el.querySelectorAll('button, a').forEach(elx => { elx.tabIndex = active ? 0 : -1; });
      }
      current = n;
      try{ localStorage.setItem(STORE, String(n)); }catch(e){}
      updateChrome();
    }
    window.goToSlide = goToSlide;

    function updateChrome(){
      document.getElementById('prev').disabled = current === 1;
      document.getElementById('next').disabled = current === TOTAL;
    }

    /* ---- Teclado ---- */
    window.addEventListener('keydown', (e)=>{
      if(e.key === 'ArrowRight' || e.key === 'PageDown'){ goToSlide(current+1); }
      else if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ goToSlide(current-1); }
      else if(e.key === 'Home'){ goToSlide(1); }
      else if(e.key === 'End'){ goToSlide(TOTAL); }
      else if(e.key === 'f' || e.key === 'F'){ toggleFs(); }
    });

    document.getElementById('prev').addEventListener('click', ()=> goToSlide(current-1));
    document.getElementById('next').addEventListener('click', ()=> goToSlide(current+1));
    document.getElementById('home').addEventListener('click', ()=> goToSlide(2));

    /* ---- Tela cheia (fullscreen) ---- */
    const fsBtn = document.getElementById('fs');
    function isFs(){ return document.fullscreenElement || document.webkitFullscreenElement; }
    function toggleFs(){
      if(isFs()){
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
      }
    }
    function updateFsIcon(){
      const on = !!isFs();
      fsBtn.title = on ? 'Sair da tela cheia' : 'Tela cheia';
      fsBtn.setAttribute('aria-label', fsBtn.title);
      document.getElementById('fs-icon').innerHTML = on
        ? '<path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/>'
        : '<path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/>';
    }
    fsBtn.addEventListener('click', toggleFs);
    document.addEventListener('fullscreenchange', updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);

    /* ---- Baixar a apresentação em PDF ---- */
    document.getElementById('dl').addEventListener('click', ()=>{
      const a = document.createElement('a');
      a.href = 'Apresentacao-Reproducao-Cria-Comercial.pdf';
      a.download = 'Apresentacao Reproducao e Cria Comercial.pdf';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    /* ---- Controles que se escondem sozinhos ---- */
    const controls = document.getElementById('controls');
    let hideT;
    function poke(){
      controls.classList.add('show');
      clearTimeout(hideT);
      hideT = setTimeout(()=> controls.classList.remove('show'), 1100);
    }
    window.addEventListener('mousemove', poke);
    window.addEventListener('click', poke);

    /* ---- Clique fora de botão: não navega; pisca os botões interativos do slide ---- */
    function flashHints(){
      const active = document.querySelector('.slide.is-active');
      if(!active) return;
      active.querySelectorAll('.hotspot, .repro-back, button, a').forEach(el=>{
        el.classList.remove('cc-hint');
        void el.offsetWidth;            // reinicia a animação
        el.classList.add('cc-hint');
        setTimeout(()=> el.classList.remove('cc-hint'), 1050);
      });
    }
    deck.addEventListener('click', (e)=>{
      if(e.target.closest('.hotspot, .repro-back, button, a')) return;  // deixa o botão agir
      flashHints();
    });

    /* ---- Restaura último slide visto ---- */
    let start = 1;
    try{ const saved = parseInt(localStorage.getItem(STORE),10); if(saved) start = clamp(saved); }catch(e){}
    goToSlide(start);
    poke();
  </script>
</body>
</html>
